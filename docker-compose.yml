services:
  voltei-postgres:
    image: postgres:17-alpine
    container_name: voltei-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: voltei
      POSTGRES_PASSWORD: voltei-dev
      POSTGRES_DB: voltei
    volumes:
      - voltei-pgdata:/var/lib/postgresql/data

volumes:
  voltei-pgdata:
