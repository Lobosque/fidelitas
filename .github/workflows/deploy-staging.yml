name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lobosque/fidelitas

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: voltei
          POSTGRES_PASSWORD: voltei-test
          POSTGRES_DB: voltei_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Test
        working-directory: server
        run: dotnet test
        env:
          TEST_DB_CONNECTION: "Host=localhost;Port=5434;Username=voltei;Password=voltei-test"

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GOOGLE_WALLET_ISSUER_ID: ${{ secrets.GOOGLE_WALLET_ISSUER_ID }}
      GOOGLE_WALLET_SA_EMAIL: ${{ secrets.GOOGLE_WALLET_SA_EMAIL }}
      GOOGLE_WALLET_SA_KEY: ${{ secrets.GOOGLE_WALLET_SA_KEY }}
      APPLE_WALLET_PASS_TYPE_ID: ${{ secrets.APPLE_WALLET_PASS_TYPE_ID }}
      APPLE_WALLET_TEAM_ID: ${{ secrets.APPLE_WALLET_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KAMAL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 20.1.176.90 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install Kamal
        run: sudo gem install kamal

      - name: Write secrets
        run: |
          mkdir -p .kamal
          printf '%s\n' \
            "KAMAL_REGISTRY_PASSWORD=$KAMAL_REGISTRY_PASSWORD" \
            "DATABASE_URL=$DATABASE_URL" \
            "JWT_SECRET=$JWT_SECRET" \
            "GOOGLE_WALLET_ISSUER_ID=$GOOGLE_WALLET_ISSUER_ID" \
            "GOOGLE_WALLET_SA_EMAIL=$GOOGLE_WALLET_SA_EMAIL" \
            "GOOGLE_WALLET_SA_KEY=$GOOGLE_WALLET_SA_KEY" \
            "APPLE_WALLET_PASS_TYPE_ID=$APPLE_WALLET_PASS_TYPE_ID" \
            "APPLE_WALLET_TEAM_ID=$APPLE_WALLET_TEAM_ID" > .kamal/secrets

      - name: Deploy
        run: kamal deploy --skip-push
