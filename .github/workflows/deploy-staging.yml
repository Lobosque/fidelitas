name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lobosque/fidelitas

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: voltei
          POSTGRES_PASSWORD: voltei-test
          POSTGRES_DB: voltei_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Generate dev Apple cert for tests
        working-directory: server/certs
        run: ./generate-dev-certs.sh

      - name: Test
        working-directory: server
        run: dotnet test
        env:
          TEST_DB_CONNECTION: "Host=localhost;Port=5434;Username=voltei;Password=voltei-test"

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Decode Apple Wallet cert
        run: |
          mkdir -p server/certs
          echo "${{ secrets.APPLE_WALLET_CERT_P12_BASE64 }}" | base64 -d > server/certs/pass-cert.p12

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GoogleWallet__IssuerId: ${{ secrets.GOOGLE_WALLET_ISSUER_ID }}
      GoogleWallet__ServiceAccountEmail: ${{ secrets.GOOGLE_WALLET_SA_EMAIL }}
      GoogleWallet__ServiceAccountPrivateKey: ${{ secrets.GOOGLE_WALLET_SA_KEY }}
      AppleWallet__PassTypeIdentifier: ${{ secrets.APPLE_WALLET_PASS_TYPE_ID }}
      AppleWallet__TeamIdentifier: ${{ secrets.APPLE_WALLET_TEAM_ID }}
      AppleWallet__CertificatePassword: ${{ secrets.APPLE_WALLET_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KAMAL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519,rsa,ecdsa -H 20.1.176.90 >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -t ed25519,rsa,ecdsa 20.1.176.90 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Kamal
        run: sudo gem install kamal

      - name: Write secrets
        run: |
          mkdir -p .kamal
          {
            printf 'KAMAL_REGISTRY_PASSWORD=%s\n' "$KAMAL_REGISTRY_PASSWORD"
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'GoogleWallet__IssuerId=%s\n' "$GoogleWallet__IssuerId"
            printf 'GoogleWallet__ServiceAccountEmail=%s\n' "$GoogleWallet__ServiceAccountEmail"
            printf 'GoogleWallet__ServiceAccountPrivateKey=%s\n' "$GoogleWallet__ServiceAccountPrivateKey"
            printf 'AppleWallet__PassTypeIdentifier=%s\n' "$AppleWallet__PassTypeIdentifier"
            printf 'AppleWallet__TeamIdentifier=%s\n' "$AppleWallet__TeamIdentifier"
            printf 'AppleWallet__CertificatePassword=%s\n' "$AppleWallet__CertificatePassword"
          } > .kamal/secrets

      - name: Deploy
        run: kamal deploy --skip-push
